<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" width="200" height="220">
  <!-- Option B: Compliance Lock -->

  <!-- Lock body (rounded rectangle) -->
  <rect x="38" y="95" width="124" height="100" rx="12" ry="12" fill="#0078D4"/>

  <!-- Lock shackle (yellow) -->
  <path d="M68 95 L68 62 A32 32 0 0 1 132 62 L132 95"
        fill="none" stroke="#FFB900" stroke-width="18" stroke-linecap="round"/>

  <!-- Shackle inner cutout -->
  <path d="M76 95 L76 65 A24 24 0 0 1 124 65 L124 95"
        fill="none" stroke="#0078D4" stroke-width="4" stroke-linecap="round"/>

  <!-- Keyhole outer circle -->
  <circle cx="100" cy="148" r="18" fill="white" opacity="0.95"/>

  <!-- Keyhole slot -->
  <rect x="95" y="154" width="10" height="20" rx="3" fill="#0078D4"/>

  <!-- Keyhole circle cutout -->
  <circle cx="100" cy="148" r="8" fill="#0078D4"/>

  <!-- Subtle gloss on lock body -->
  <rect x="38" y="95" width="124" height="30" rx="12" ry="12" fill="white" opacity="0.08"/>

  <!-- Wordmark -->
  <text x="100" y="216" font-family="'Segoe UI', Arial, sans-serif"
        font-size="22" font-weight="700" fill="#201F1E"
        text-anchor="middle" letter-spacing="1">
    Regul<tspan fill="#0078D4">it</tspan>
  </text>
</svg>
